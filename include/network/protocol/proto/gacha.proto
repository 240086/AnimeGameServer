syntax = "proto3";

package anime;

// 抽卡请求（单抽和十连可以共用，或者通过内部字段区分）
message GachaDrawRequest
{
    // 预留：未来可以加入抽卡池 ID 等字段
}

// 单个道具的抽取结果
message GachaDrawResponse
{
    uint32 item_id = 1;
    uint32 rarity = 2;
}

// 十连抽/多连抽的统一响应包
message GachaDrawTenResponse
{
    // 使用 repeated 关键字，表示这是一个 GachaDrawResponse 的列表
    repeated GachaDrawResponse results = 1;
}