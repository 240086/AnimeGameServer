syntax = "proto3";

package anime;

// 抽卡请求（单抽和十连都复用该结构）
message GachaDrawRequest
{
    // 目标卡池 ID，默认 1
    uint32 pool_id = 1;

    // 客户端链路追踪 ID（可选），便于排查重试/乱序问题
    string client_trace_id = 2;
}

message GachaDrawResponse
{
    uint32 item_id = 1;
    uint32 rarity = 2;
}

message GachaDrawTenResponse
{
    repeated GachaDrawResponse results = 1;
}